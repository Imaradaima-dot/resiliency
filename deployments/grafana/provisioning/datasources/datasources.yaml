apiVersion: 1

datasources:
  # Prometheus — operational metrics (goroutines, memory, request rates)
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: prometheus-ds

  # Infinity — calls our REST API for business data (event counts, weather, health)
  # Uses the yesoreyeram-infinity-datasource plugin (installed via GF_INSTALL_PLUGINS)
  - name: ResiliencyAPI
    type: yesoreyeram-infinity-datasource
    access: proxy
    uid: resiliency-api-ds
    jsonData:
      base_url: "http://api:8080"
