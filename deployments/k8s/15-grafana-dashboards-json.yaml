                { "selector": "percentage", "text": "percentage", "type": "number" }
              ]
            }
          ]
        }
      ],
      "schemaVersion": 39
    }

  rpt03_regional_weather.json: |
    {
      "id": null,
      "uid": "rpt03-regional-weather",
      "title": "Regional Weather Dashboard (RPT-03)",
      "description": "Average temperature, humidity, and wind speed per region from OpenWeatherMap",
      "tags": ["resiliency", "rpt03"],
      "refresh": "5m",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "barchart",
          "title": "Average Temperature by Region (°C)",
          "gridPos": { "x": 0, "y": 0, "w": 8, "h": 9 },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "color": { "mode": "palette-classic" }
            }
          },
          "options": {
            "orientation": "vertical",
            "xField": "region",
            "tooltip": { "mode": "single" }
          },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "resiliency-api-ds" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "url": "http://api:8080/api/weather/regions",
              "url_options": { "method": "GET" },
              "root_selector": "",
              "columns": [
                { "selector": "region", "text": "region", "type": "string" },
                { "selector": "avg_temp_c", "text": "avg_temp_c", "type": "number" }
              ]
            }
          ]
        },
        {
          "id": 2,
          "type": "barchart",
          "title": "Average Humidity by Region (%)",
          "gridPos": { "x": 8, "y": 0, "w": 8, "h": 9 },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": { "mode": "palette-classic" }
            }
          },
          "options": {
            "orientation": "vertical",
            "xField": "region",
            "tooltip": { "mode": "single" }
          },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "resiliency-api-ds" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "url": "http://api:8080/api/weather/regions",
              "url_options": { "method": "GET" },
              "root_selector": "",
              "columns": [
                { "selector": "region", "text": "region", "type": "string" },
                { "selector": "avg_humidity", "text": "avg_humidity", "type": "number" }
              ]
            }
          ]
        },
        {
          "id": 3,
          "type": "barchart",
          "title": "Average Wind Speed by Region (m/s)",
          "gridPos": { "x": 16, "y": 0, "w": 8, "h": 9 },
          "fieldConfig": {
            "defaults": {
              "unit": "velocityms",
              "color": { "mode": "palette-classic" }
            }
          },
          "options": {
            "orientation": "vertical",
            "xField": "region",
            "tooltip": { "mode": "single" }
          },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "resiliency-api-ds" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "url": "http://api:8080/api/weather/regions",
              "url_options": { "method": "GET" },
              "root_selector": "",
              "columns": [
                { "selector": "region", "text": "region", "type": "string" },
                { "selector": "avg_wind_speed", "text": "avg_wind_speed", "type": "number" }
              ]
            }
          ]
        },
        {
          "id": 4,
          "type": "table",
          "title": "Regional Weather Detail",
          "gridPos": { "x": 0, "y": 9, "w": 24, "h": 7 },
          "options": {
            "sortBy": [{ "displayName": "avg_temp_c", "desc": true }]
          },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "resiliency-api-ds" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "url": "http://api:8080/api/weather/regions",
              "url_options": { "method": "GET" },
              "root_selector": "",
              "columns": [
                { "selector": "region", "text": "region", "type": "string" },
                { "selector": "city_count", "text": "city_count", "type": "number" },
                { "selector": "avg_temp_c", "text": "avg_temp_c", "type": "number" },
                { "selector": "avg_humidity", "text": "avg_humidity", "type": "number" },
                { "selector": "avg_wind_speed", "text": "avg_wind_speed", "type": "number" },
                { "selector": "observation_ts", "text": "observation_ts", "type": "timestamp" },
                { "selector": "computed_at", "text": "computed_at", "type": "timestamp" }
              ]
            }
          ]
        }
      ],
      "schemaVersion": 39
    }

  rpt04_region_health.json: |
    {
      "id": null,
      "uid": "rpt04-region-health",
      "title": "Region Health Monitor (RPT-04)",
      "description": "Live region health status, latency, and write concern configuration",
      "tags": ["resiliency", "rpt04"],
      "refresh": "15s",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Regions Monitored",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 5 },
          "options": {
            "textMode": "value",
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["count"] }
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "healthy": { "text": "HEALTHY", "color": "green", "index": 0 } } },
                { "type": "value", "options": { "degraded": { "text": "DEGRADED", "color": "yellow", "index": 1 } } },
                { "type": "value", "options": { "down": { "text": "DOWN", "color": "red", "index": 2 } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 0 }
                ]
              }
            }
          },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "resiliency-api-ds" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "url": "http://api:8080/api/regions/health",
              "url_options": { "method": "GET" },
              "root_selector": "",
              "columns": [
                { "selector": "latency_ms", "text": "regions_monitored", "type": "number" }
              ]
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Ping Latency per Region",
          "gridPos": { "x": 6, "y": 0, "w": 10, "h": 5 },
          "options": {
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["min"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 200 },
                  { "color": "red", "value": 500 }
                ]
              }
            }
          },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "resiliency-api-ds" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "url": "http://api:8080/api/regions/health",
              "url_options": { "method": "GET" },
              "root_selector": "",
              "columns": [
                { "selector": "latency_ms", "text": "latency_ms", "type": "number" }
              ]
            }
          ]
        },
        {
          "id": 3,
          "type": "table",
          "title": "Region Health Detail",
          "gridPos": { "x": 0, "y": 5, "w": 20, "h": 8 },
          "options": {
            "sortBy": [{ "displayName": "latency_ms", "desc": false }]
          },
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "status" },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "healthy": { "text": "healthy", "color": "green", "index": 0 } } },
                      { "type": "value", "options": { "degraded": { "text": "degraded", "color": "yellow", "index": 1 } } },
                      { "type": "value", "options": { "down": { "text": "down", "color": "red", "index": 2 } } }
                    ]
                  },
                  { "id": "custom.displayMode", "value": "color-text" }
                ]
              }
            ]
          },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "resiliency-api-ds" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "url": "http://api:8080/api/regions/health",
              "url_options": { "method": "GET" },
              "root_selector": "",
              "columns": [
                { "selector": "region", "text": "Region", "type": "string" },
                { "selector": "status", "text": "status", "type": "string" },
                { "selector": "latency_ms", "text": "latency_ms", "type": "number" },
                { "selector": "write_concern", "text": "Write Concern", "type": "string" },
                { "selector": "last_check", "text": "Last Check", "type": "timestamp" }
              ]
            }
          ]
        }
      ],
      "schemaVersion": 39
    }

  rpt05_routing_decision.json: |
    {
      "id": null,
      "uid": "rpt05-routing-decision",
      "title": "Routing Decision & Continuity Signal (RPT-05)",
      "description": "Current preferred and fallback routing regions, latency, and decision metadata",
      "tags": ["resiliency", "rpt05"],
      "refresh": "15s",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Preferred Region",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "options": {
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "fixedColor": "green", "mode": "fixed" }
            }
          },
          "datasource": { "type": "yesoreyeram-infinity-datasource", "uid": "resiliency-api-ds" },
          "targets": [
            {
              "refId": "A",
              "type": "json",
              "source": "url",
              "url": "http://api:8080/api/routing/current/rows",
              "url_options": { "method": "GET" },
              "root_selector": "",
