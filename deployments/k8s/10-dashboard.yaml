apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: resiliency
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: us-central1-docker.pkg.dev/dataengineering-496300/resiliency-repo/resiliency-dashboard:step10
          ports:
            - containerPort: 8501
          env:
            - name: API_BASE_URL
              value: "http://api:8080"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: resiliency
spec:
  selector:
    app: dashboard
  ports:
    - port: 8501
      targetPort: 8501
  type: ClusterIP
