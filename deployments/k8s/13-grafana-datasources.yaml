apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: resiliency
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        uid: prometheus-ds

      - name: ResiliencyAPI
        type: yesoreyeram-infinity-datasource
        access: proxy
        uid: resiliency-api-ds
        jsonData:
          base_url: "http://api:8080"
