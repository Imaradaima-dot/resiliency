apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: resiliency
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: resiliency-dashboards
        orgId: 1
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
