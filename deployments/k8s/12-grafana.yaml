apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: resiliency
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.3
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: resiliency-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            # Root URL uses the external IP — updated after LoadBalancer IP is assigned
            - name: GF_SERVER_ROOT_URL
              value: "http://%(domain)s:3000"
            # Install Infinity datasource plugin so dashboards can call our REST API
            - name: GF_INSTALL_PLUGINS
              value: "yesoreyeram-infinity-datasource"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: grafana-dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: grafana-dashboards-json
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: grafana-dashboards-json
          configMap:
            name: grafana-dashboards-json
---
# LoadBalancer — assigns a GCP external IP so Grafana is reachable
# without kubectl port-forward. Get the IP with:
#   kubectl get svc grafana -n resiliency
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: resiliency
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: LoadBalancer
