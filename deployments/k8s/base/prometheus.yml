global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ingestor
    static_configs:
      - targets: ["ingestor:8081"]

  - job_name: transformer
    static_configs:
      - targets: ["transformer:8082"]

  - job_name: aggregator
    static_configs:
      - targets: ["aggregator:8085"]

  - job_name: healthcheck
    static_configs:
      - targets: ["healthcheck:8083"]

  - job_name: router
    static_configs:
      - targets: ["router:8084"]

  - job_name: api
    static_configs:
      - targets: ["api:8080"]
