# Tells Grafana where to find pre-built dashboard JSON files.
apiVersion: 1

providers:
  - name: resiliency-dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30   # reload dashboards from disk every 30s
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
